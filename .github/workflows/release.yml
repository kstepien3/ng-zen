name: Release

on:
  push:
    branches: [master, next]
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Pre-release channel (leave empty for stable release)'
        required: false
        type: choice
        options: ['', 'next']

env:
  NODE_VERSION: 24
  PNPM_VERSION: 10.24.0

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    outputs:
      skip: ${{ steps.check.outputs.skip }}

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Enable Corepack
        run: corepack enable

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Get pnpm cache directory
        id: pnpm-cache-dir
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache-dir.outputs.STORE_PATH }}
          key: node-v${{ env.NODE_VERSION }}-pnpm-v${{ env.PNPM_VERSION }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: node-v${{ env.NODE_VERSION }}-pnpm-v${{ env.PNPM_VERSION }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for releasable commits
        id: check
        run: |
          if pnpm release-it --dry-run --ci; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
        env:
          HUSKY: 0
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release
        if: steps.check.outputs.skip != 'true'
        run: |
          PRERELEASE="${{ inputs.prerelease != '' && inputs.prerelease || (github.ref_name == 'next' && 'next' || '') }}"
          if [ -n "$PRERELEASE" ]; then
            pnpm release-it --preRelease=$PRERELEASE --github.preRelease=true --ci
          else
            pnpm release-it --ci
          fi
        env:
          HUSKY: 0
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

